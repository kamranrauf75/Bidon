services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paynest
      POSTGRES_PASSWORD: paynest
      POSTGRES_DB: paynest
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://paynest:paynest@postgres:5432/paynest?schema=public
    depends_on:
      - postgres
    ports:
      - '3000:3000'

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  postgres_data:
